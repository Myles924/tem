<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作视频指南</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #e4393c; color: #fff; text-align: center; padding: 20px 16px; }
  .header h1 { font-size: 22px; font-weight: bold; }
  .header p { font-size: 16px; margin-top: 8px; opacity: 0.9; }
  .video-list { padding: 12px; }
  .video-item { background: #fff; border-radius: 10px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .video-item video { width: 100%; display: block; }
  .video-info { padding: 14px 16px; }
  .video-info h2 { font-size: 19px; color: #222; margin-bottom: 6px; }
  .video-info p { font-size: 16px; color: #666; line-height: 1.5; }
  .tip { text-align: center; padding: 16px; color: #999; font-size: 14px; }
</style>
</head>
<body>
  <div class="header">
    <h1>📹 操作视频指南</h1>
    <p>点击视频即可播放，遇到问题请先观看对应视频</p>
  </div>
  <div class="video-list">

    <div class="video-item">
      <video controls preload="metadata" playsinline>
        <source src="引真轴温便携式设备安装教程.mp4" type="video/mp4">
      </video>
      <div class="video-info">
        <h2>引真轴温便携式设备安装教程</h2>
        <p>便携式设备的完整安装步骤演示</p>
      </div>
    </div>

    <div class="video-item">
      <video controls preload="metadata" playsinline>
        <source src="便携式常见问题.mp4" type="video/mp4">
      </video>
      <div class="video-info">
        <h2>便携式常见问题</h2>
        <p>使用中常见故障及解决方法</p>
      </div>
    </div>

    <div class="video-item">
      <video controls preload="metadata" playsinline>
        <source src="报修教程.mp4" type="video/mp4">
      </video>
      <div class="video-info">
        <h2>报修教程</h2>
        <p>设备出现故障如何报修</p>
      </div>
    </div>

    <div class="video-item">
      <video controls preload="metadata" playsinline>
        <source src="货车挂车换绑流程.mp4" type="video/mp4">
      </video>
      <div class="video-info">
        <h2>货车挂车换绑流程</h2>
        <p>货车挂车设备换绑流程</p>
      </div>
    </div>


   
  </div>
  <div class="tip">如视频无法播放，请检查网络或联系管理员</div>
</body>
</html>
